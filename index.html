<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学写名字 - 葛素英</title>
    <meta name="description" content="跟着笔画顺序学写名字：葛素英">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>

<body>
    <!-- 开始页面（解决微信浏览器需要用户交互才能播放语音的问题） -->
    <div id="start-page" class="page active">
        <div class="start-content">
            <div class="start-emoji">✍️</div>
            <h1 class="start-title">学写名字</h1>
            <p class="start-subtitle">葛 素 英</p>
            <button class="btn btn-start" id="start-btn" onclick="startApp()">
                <span>开始学写</span>
            </button>
        </div>
    </div>

    <!-- 练习页面 -->
    <div id="practice-page" class="page">
        <div class="header">
            <h1 id="page-title">学写名字</h1>
            <div class="progress-bar">
                <div class="progress-dots">
                    <span class="dot active" data-index="0">葛</span>
                    <span class="dot" data-index="1">素</span>
                    <span class="dot" data-index="2">英</span>
                </div>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="practice-area">
            <div id="hint-text" class="hint-text">跟着红色笔画写一写吧！</div>
            <div class="grid-wrapper">
                <div class="tian-zi-ge" id="tian-zi-ge">
                    <div class="grid-lines">
                        <div class="line horizontal"></div>
                        <div class="line vertical"></div>
                    </div>
                    <div id="writer-container"></div>
                </div>
            </div>
            <div class="stroke-counter">
                <span id="stroke-progress">第 <strong id="current-stroke">0</strong> / <strong
                        id="total-strokes">0</strong> 笔</span>
            </div>
        </div>

        <div class="action-area">
            <button id="next-btn" class="btn btn-next hidden" onclick="nextCharacter()">
                <span>下一个字</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <!-- 完成页面 -->
    <div id="complete-page" class="page">
        <div class="complete-content">
            <div class="celebration-emoji">🎉</div>
            <h1 class="complete-title">太棒了！</h1>
            <p class="complete-subtitle">你的名字写好了</p>
            <div class="complete-characters" id="complete-characters">
                <!-- 三个完成的字会动态插入 -->
            </div>
            <button class="btn btn-restart" onclick="restartPractice()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 4v6h6M23 20v-6h-6" />
                    <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
                </svg>
                <span>再写一次</span>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
